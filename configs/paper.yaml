experiment_name: run_paper_v1

model:
  backend: paper
  vocab_size: 40
  freeze_early_effnet: true
  use_self_attn: false  # existing paper_best_model.pt was trained without self-attn
  backend_kwargs: {}
  display_name: "LipSyncNet (paper)"
  color: "#8E44AD"

training:
  num_epochs: 100
  learning_rate: 1.0e-4
  batch_size: 2
  accum_steps: 4
  max_grad_norm: 5.0
  use_amp: true
  num_workers: 2
  prefetch: 4

data:
  dataset: grid
  speakers: [s1, s2, s3, s4, s5]
  samples_per_speaker: 200
  train_size: 450
  seed: 42

checkpointing:
  hf_repo: null
  hf_subfolder: null
